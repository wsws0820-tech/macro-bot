<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>매크로 경제 해석기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-alt: #1a2235;
    --border: #1e2d4a;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --accent-glow: rgba(0,212,170,0.25);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,0.12);
    --error: #ef4444;
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #475569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(170deg, var(--bg) 0%, #0d1320 50%, #0a1628 100%);
    color: var(--text);
    font-family: 'DM Sans', 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,45,74,0.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,45,74,0.13) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 16px 80px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.2);
    margin-bottom: 14px;
  }

  h1 {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.03em; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  /* API Key */
  .api-key-section { margin-bottom: 14px; }
  .api-key-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-input {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .api-key-toggle {
    padding: 10px 14px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .api-key-hint {
    font-size: 11px; color: var(--text-muted);
    margin-top: 6px; line-height: 1.5;
  }
  .api-key-hint a { color: var(--accent); text-decoration: none; }

  /* Textarea */
  textarea {
    width: 100%; min-height: 160px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-size: 13px; line-height: 1.7;
    font-family: 'JetBrains Mono', 'D2Coding', monospace;
    resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea::placeholder { color: var(--text-muted); }

  /* Buttons */
  .btn-row {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .btn-primary {
    flex: 1; min-width: 140px;
    padding: 13px 20px; border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #00b894);
    color: #000; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    padding: 13px 16px; border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text-dim);
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:active { transform: scale(0.97); }

  /* Loading */
  .loading-card .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(0,212,170,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-label { font-size: 14px; color: var(--accent); font-weight: 600; }
  .skeleton {
    background: linear-gradient(90deg, var(--surface-alt) 25%, rgba(30,45,74,0.27) 50%, var(--surface-alt) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px; height: 16px; margin-bottom: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section */
  .section-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 700;
    margin-bottom: 14px; letter-spacing: -0.02em;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* Result cards */
  .result-card {
    background: var(--surface-alt);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .tag {
    display: inline-block;
    padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
    margin-right: 6px; margin-bottom: 4px;
  }
  .prose {
    font-size: 14px; line-height: 1.8;
    color: var(--text); white-space: pre-wrap;
  }

  /* Error */
  .error-card { border-color: rgba(239,68,68,0.27) !important; }
  .error-msg { display: flex; align-items: center; gap: 10px; color: var(--error); font-size: 14px; font-weight: 600; }

  /* Footer */
  .footer {
    text-align: center; margin-top: 28px;
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 20px 12px 60px; }
    h1 { font-size: 24px; }
    .card { padding: 16px; }
    textarea { min-height: 140px; font-size: 12px; }
    .btn-row { gap: 6px; }
    .btn-primary { font-size: 13px; padding: 12px 16px; }
    .btn-secondary { font-size: 11px; padding: 11px 12px; }
  }
</style>
</head>
<body>

<div class="grid-overlay"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="badge">📡 MACRO DECODER</div>
    <h1>매크로 경제 해석기</h1>
    <p class="subtitle">카톡 메시지를 붙여넣으면 용어 해설 · 팩트체크 · 이슈 요약을 한번에</p>
  </div>

  <!-- API Key -->
  <div class="card">
    <div class="api-key-section">
      <div class="api-key-label">🔑 Anthropic API Key</div>
      <div class="api-key-row">
        <input id="apiKey" type="password" class="api-key-input" placeholder="sk-ant-api03-..." />
        <button class="api-key-toggle" onclick="toggleKeyVisibility()" id="toggleBtn">👁</button>
      </div>
      <div class="api-key-hint">
        API 키는 브라우저에만 저장되며 외부 서버로 전송되지 않습니다.
        <a href="https://console.anthropic.com/settings/keys" target="_blank">키 발급받기 →</a>
      </div>
    </div>

    <!-- Textarea -->
    <textarea id="msgInput" placeholder="카카오톡 오픈채팅방 메시지를 여기에 붙여넣으세요..."></textarea>

    <div class="btn-row">
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">🔍 분석 시작</button>
      <button class="btn-secondary" onclick="loadSample()">📋 예시</button>
      <button class="btn-secondary" onclick="resetAll()">초기화</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <div class="footer">
    카톡 메시지 복사 → 붙여넣기 → 분석 시작<br>
    Powered by Claude API · 팩트체크는 웹 검색 기반
  </div>
</div>

<script>
const SAMPLE = `[오전 7:30] 매크로봇: 🇺🇸 미국 CPI 3.5% 발표, 예상치 3.4% 상회
연준 6월 금리인하 가능성 급락, CME 페드워치 기준 30%대로 하락
10년물 국채금리 4.6% 돌파하며 달러 강세 전환

[오전 7:32] 매크로봇: 🇯🇵 BOJ 금리 동결, 엔화 155엔 돌파
일본 재무성 구두개입 시사, 실개입 가능성 주시

[오전 7:35] 매크로봇: 오늘 주요 일정
- 한국 1분기 GDP 속보치 발표 (오전 8시)
- 미국 신규실업수당 청구건수 (오후 9:30)
- ECB 라가르드 총재 연설 (오후 11시)

[오전 7:38] 매크로봇: 반도체 섹터 주의
ASML 실적 miss로 나스닥 선물 하락 중
필라델피아 반도체지수 -3.2%`;

// Load saved key
const savedKey = localStorage.getItem('anthropic_api_key');
if (savedKey) document.getElementById('apiKey').value = savedKey;

function toggleKeyVisibility() {
  const inp = document.getElementById('apiKey');
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function loadSample() {
  document.getElementById('msgInput').value = SAMPLE;
  document.getElementById('results').innerHTML = '';
}

function resetAll() {
  document.getElementById('msgInput').value = '';
  document.getElementById('results').innerHTML = '';
}

function showLoading(phase) {
  return `
    <div class="card loading-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div class="spinner"></div>
        <span class="loading-label">${phase}</span>
      </div>
      <div class="skeleton" style="width:90%"></div>
      <div class="skeleton" style="width:75%"></div>
      <div class="skeleton" style="width:60%"></div>
    </div>`;
}

function showError(msg) {
  return `<div class="card error-card"><div class="error-msg"><span>⚠️</span><span>${msg}</span></div></div>`;
}

function verdictStyle(v) {
  if (v && v.includes('사실') && !v.includes('부정확'))
    return { bg: 'var(--accent-dim)', color: 'var(--accent)', icon: '✅' };
  if (v && v.includes('확인'))
    return { bg: 'var(--warn-dim)', color: 'var(--warn)', icon: '⚠️' };
  if (v && v.includes('부정확'))
    return { bg: 'rgba(239,68,68,0.12)', color: 'var(--error)', icon: '❌' };
  return { bg: 'var(--blue-dim)', color: 'var(--blue)', icon: 'ℹ️' };
}

function renderResults(data) {
  let html = '<div style="animation:fadeUp 0.5s ease-out">';

  // Glossary
  if (data.glossary && data.glossary.length) {
    html += `<div class="card" style="border-color:rgba(0,212,170,0.2)">
      <div class="section-title">
        <div class="dot" style="background:var(--accent);box-shadow:0 0 8px rgba(0,212,170,0.4)"></div>
        📖 용어 해설
      </div>`;
    data.glossary.forEach(g => {
      html += `<div class="result-card" style="border:1px solid rgba(0,212,170,0.2)">
        <span class="tag" style="background:var(--accent-dim);color:var(--accent)">${esc(g.term)}</span>
        <p class="prose" style="margin-top:8px">${esc(g.explanation)}</p>
      </div>`;
    });
    html += '</div>';
  }

  // Factcheck
  if (data.factcheck && data.factcheck.length) {
    html += `<div class="card" style="border-color:rgba(59,130,246,0.2)">
      <div class="section-title">
        <div class="dot" style="background:var(--blue);box-shadow:0 0 8px rgba(59,130,246,0.4)"></div>
        🔎 팩트체크
      </div>`;
    data.factcheck.forEach(f => {
      const vs = verdictStyle(f.verdict);
      html += `<div class="result-card" style="border:1px solid rgba(59,130,246,0.2)">
        <div style="margin-bottom:8px">
          <span class="tag" style="background:${vs.bg};color:${vs.color}">${vs.icon} ${esc(f.verdict)}</span>
        </div>
        <p style="font-size:14px;font-weight:600;margin-bottom:6px">"${esc(f.claim)}"</p>
        <p class="prose" style="color:var(--text-dim)">${esc(f.detail)}</p>
      </div>`;
    });
    html += '</div>';
  }

  // Summary
  if (data.summary) {
    html += `<div class="card" style="border-color:rgba(245,158,11,0.2)">
      <div class="section-title">
        <div class="dot" style="background:var(--warn);box-shadow:0 0 8px rgba(245,158,11,0.4)"></div>
        📌 오늘의 이슈 요약
      </div>`;
    if (data.summary.overnight) {
      html += `<div class="result-card" style="border:1px solid rgba(245,158,11,0.2)">
        <span class="tag" style="background:var(--warn-dim);color:var(--warn)">🌙 전일 이슈</span>
        <p class="prose" style="margin-top:8px">${esc(data.summary.overnight)}</p>
      </div>`;
    }
    if (data.summary.today) {
      html += `<div class="result-card" style="border:1px solid rgba(59,130,246,0.2)">
        <span class="tag" style="background:var(--blue-dim);color:var(--blue)">☀️ 오늘 주목</span>
        <p class="prose" style="margin-top:8px">${esc(data.summary.today)}</p>
      </div>`;
    }
    if (data.summary.actionable) {
      html += `<div class="result-card" style="border:1px solid rgba(0,212,170,0.2);background:linear-gradient(135deg,var(--accent-dim),rgba(0,184,148,0.06))">
        <span class="tag" style="background:var(--accent-dim);color:var(--accent)">💡 핵심 포인트</span>
        <p class="prose" style="margin-top:8px;font-weight:600;color:var(--accent)">${esc(data.summary.actionable)}</p>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const input = document.getElementById('msgInput').value.trim();
  const results = document.getElementById('results');
  const btn = document.getElementById('analyzeBtn');

  if (!apiKey) {
    results.innerHTML = showError('API Key를 입력해주세요. <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent)">발급받기 →</a>');
    return;
  }
  if (!input) {
    results.innerHTML = showError('분석할 메시지를 붙여넣어주세요.');
    return;
  }

  // Save key
  localStorage.setItem('anthropic_api_key', apiKey);

  btn.disabled = true;
  btn.textContent = '분석 중...';

  const phases = ['메시지 파싱 중...', '경제 용어 해설 생성 중...', '팩트체크 검색 중...', '이슈 요약 정리 중...'];
  let pi = 0;
  results.innerHTML = showLoading(phases[0]);
  const phaseTimer = setInterval(() => {
    pi = (pi + 1) % phases.length;
    const label = document.querySelector('.loading-label');
    if (label) label.textContent = phases[pi];
  }, 3000);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `당신은 매크로 경제 전문 애널리스트이자, 초보 투자자를 위한 해설가입니다.
아래 카카오톡 오픈채팅방 메시지를 분석해서 정확히 아래 JSON 형식으로만 응답해주세요.
마크다운 백틱이나 다른 텍스트 없이 JSON만 출력하세요.

분석할 메시지:
"""
${input}
"""

응답 JSON 형식:
{
  "glossary": [
    { "term": "경제 용어", "explanation": "초등학생도 이해할 수 있는 쉬운 설명 (비유 포함)" }
  ],
  "factcheck": [
    { "claim": "메시지에서 추출한 핵심 주장", "verdict": "사실 | 대체로 사실 | 확인 필요 | 부정확", "detail": "웹 검색 결과를 바탕으로 한 팩트체크 설명" }
  ],
  "summary": {
    "overnight": "전날 밤~오늘 새벽 주요 이슈 요약 (2~3문장)",
    "today": "오늘 주목할 이벤트와 시장 영향 (2~3문장)",
    "actionable": "초보 투자자가 알아야 할 핵심 포인트 (1~2문장)"
  }
}

중요 지침:
- glossary: 메시지에 나오는 전문 용어를 모두 찾아 쉽게 설명. CPI, 국채금리, 페드워치 등
- factcheck: 구체적 수치나 주장을 웹 검색으로 확인. 최소 3개 이상
- summary: 초보자 시각에서 "그래서 뭐가 중요한데?" 관점으로 정리
- 모든 설명은 한국어로, 존댓말 사용`
        }],
      }),
    });

    const data = await resp.json();

    if (data.error) {
      throw new Error(data.error.message || 'API 오류');
    }

    const textBlocks = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    if (!textBlocks) throw new Error('응답에서 텍스트를 찾을 수 없습니다');

    const cleaned = textBlocks.replace(/```json|```/g, '').trim();
    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 파싱 실패. 다시 시도해주세요.');

    const parsed = JSON.parse(jsonMatch[0]);
    results.innerHTML = renderResults(parsed);

  } catch (err) {
    console.error(err);
    let msg = err.message || '분석 중 오류가 발생했습니다.';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      msg = 'API 연결 실패. CORS 문제일 수 있습니다. 아래 배포 가이드를 참고해주세요.';
    }
    results.innerHTML = showError(msg);
  } finally {
    clearInterval(phaseTimer);
    btn.disabled = false;
    btn.textContent = '🔍 분석 시작';
  }
}

// Enter key support
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) analyze();
});
</script>
</body>
</html>
